name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests && ruff format --check src tests
      - name: Test
        run: pytest
        env:
          EDGAR_USER_AGENT: "CI ci@example.com"
      - name: Dagster definitions load
        run: python -c "from edgar_pipeline.definitions import defs; print(defs)"
        env:
          EDGAR_USER_AGENT: "CI ci@example.com"
