version: 2

models:
  - name: stg_form4_transactions
    description: >
      Form 4 transaction grain with 4/A amendments superseding originals.
    columns:
      - name: accession_number
        tests: [not_null]
      - name: issuer_cik
        tests: [not_null]
      - name: transaction_date
        tests: [not_null]
      - name: acquired_disposed
        tests:
          - accepted_values:
              arguments:
                values: ["A", "D"]
  - name: fct_insider_flows
    description: Daily net open-market insider flow per issuer.
    columns:
      - name: issuer_cik
        tests: [not_null]
      - name: net_flow
        tests: [not_null]
  - name: fct_owner_transactions
    description: Owner-level transaction detail per issuer, amendments resolved.
    columns:
      - name: issuer_cik
        tests: [not_null]
      - name: owner_cik
        tests: [not_null]
      - name: is_first_buy
        description: >
          True iff this is a code-P transaction on the owner's earliest P date
          for this issuer within the lake (starts 2026-06-22). Not "first ever".
        tests: [not_null]
  - name: stg_sp500
    description: Daily S&P 500 index close from FRED; full-history snapshot.
    columns:
      - name: date
        tests: [not_null, unique]
      - name: close
        tests: [not_null]
